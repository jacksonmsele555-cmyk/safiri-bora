<!DOCTYPE html>
<html lang="sw">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safari Bora | Mawasiliano</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
         :root {
            --primary-gold: #eab308;
            --deep-blue: #050a18;
            --bg-gradient: radial-gradient(circle at top, #1e3a8a 0%, #050a18 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
        }
        
        .app-card {
            width: 100%;
            max-width: 400px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 35px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
            position: relative;
            animation: slideUp 0.6s ease-out;
        }
        
        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        /* Icon ya Mawasiliano 3D */
        
        .icon-box {
            width: 80px;
            height: 80px;
            background: var(--primary-gold);
            border-radius: 25px;
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            color: black;
            box-shadow: 0 15px 30px rgba(234, 179, 8, 0.3);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 15px 30px rgba(234, 179, 8, 0.3);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 15px 50px rgba(234, 179, 8, 0.5);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 15px 30px rgba(234, 179, 8, 0.3);
            }
        }
        
        h2 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(to bottom, #fff, var(--primary-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        p {
            color: #94a3b8;
            margin-bottom: 30px;
            font-size: 14px;
            line-height: 1.5;
        }
        /* Vitufe vya Mawasiliano */
        
        .contact-methods {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .btn-call {
            background: linear-gradient(145deg, #22c55e, #16a34a);
            color: white;
            padding: 18px;
            border-radius: 20px;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-weight: 800;
            font-size: 16px;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(34, 197, 94, 0.2);
        }
        
        .btn-whatsapp {
            background: #25d366;
            color: white;
            padding: 18px;
            border-radius: 20px;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-weight: 800;
            transition: 0.3s;
        }
        
        .btn-back {
            margin-top: 20px;
            background: transparent;
            border: 1px solid var(--glass-border);
            color: #94a3b8;
            padding: 12px;
            border-radius: 15px;
            cursor: pointer;
            width: 100%;
        }
        
        .btn-call:hover,
        .btn-whatsapp:hover {
            transform: translateY(-5px);
            filter: brightness(1.1);
        }
    </style>
</head>

<body>

    <div class="app-card">
        <div class="icon-box">
            <i class="fas fa-headset"></i>
        </div>

        <h2>Wasiliana Nasi</h2>
        <p>Safari Bora ipo tayari kukuhudumia saa 24/7. Chagua njia ya mawasiliano hapa chini:</p>

        <div class="contact-methods">
            <a href="tel:0780777380" class="btn-call">
                <i class="fas fa-phone-alt"></i> Piga Simu Sasa
            </a>

            <a href="https://wa.me/255780777380" class="btn-whatsapp">
                <i class="fab fa-whatsapp"></i> Chat na CEO
            </a>
        </div>

        <button class="btn-back" onclick="window.location.href='index.html'">
            <i class="fas fa-arrow-left"></i> Rudi Mwanzo
        </button>
    </div>

</body>

</html>
