<!DOCTYPE html>
<html lang="sw">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safari Bora | Mazao Direct</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
         :root {
            --gold: #eab308;
            --bg: #050a18;
        }
        
        body {
            background: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        
        .full-page {
            min-height: 100vh;
            padding: 30px 20px;
            background: radial-gradient(circle at top right, #1e3a8a 0%, #050a18 80%);
        }
        
        .header-simple {
            text-align: left;
            margin-bottom: 30px;
        }
        
        .header-simple h2 {
            font-size: 28px;
            font-weight: 900;
            margin: 0;
            color: var(--gold);
        }
        
        .header-simple p {
            color: #94a3b8;
            font-size: 14px;
        }
        
        .form-content {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .input-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 15px;
            transition: 0.3s;
        }
        
        .input-box:focus-within {
            border-color: var(--gold);
            background: rgba(255, 255, 255, 0.07);
        }
        
        label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            color: var(--gold);
            font-weight: 800;
            margin-bottom: 8px;
        }
        
        select,
        input,
        textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
            font-family: inherit;
        }
        
        .btn-direct {
            background: linear-gradient(135deg, var(--gold), #b45309);
            color: black;
            padding: 22px;
            border-radius: 22px;
            border: none;
            font-weight: 900;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 15px 30px rgba(234, 179, 8, 0.2);
            margin-top: 10px;
            text-transform: uppercase;
        }
        
        .btn-direct:active {
            transform: scale(0.98);
        }
    </style>
</head>

<body>

    <div class="full-page">
        <div class="header-simple">
            <button onclick="window.history.back()" style="background:none; border:none; color:var(--gold); margin-bottom:10px;"><i class="fas fa-chevron-left"></i> Rudi</button>
            <h2>Usafiri wa Mazao</h2>
            <p>Tuma maelezo moja kwa moja kwa Admin</p>
        </div>

        <div class="form-content">
            <div class="input-box">
                <label>Zao & Idadi</label>
                <input type="text" id="zao_data" placeholder="Mfano: Magunia 200 ya Mahindi">
            </div>

            <div class="input-box">
                <label>Safari</label>
                <input type="text" id="safari_data" placeholder="Kutoka Mbeya kwenda Dar">
            </div>

            <div class="input-box">
                <label>Jina na Simu yako</label>
                <input type="text" id="mteja_data" placeholder="Jina na namba ya simu">
            </div>

            <button class="btn-direct" onclick="hifadhiNaTuma()">
            Tuma Agizo Sasa <i class="fas fa-paper-plane"></i>
        </button>
        </div>
    </div>

    <script>
        function hifadhiNaTuma() {
            const zao = document.getElementById('zao_data').value;
            const safari = document.getElementById('safari_data').value;
            const mteja = document.getElementById('mteja_data').value;

            if (!zao || !safari || !mteja) {
                alert("Tafadhali jaza taarifa zote!");
                return;
            }

            // Kutengeneza kitu cha kuhifadhi (Object)
            const agizoJipya = {
                id: Date.now(),
                zao: zao,
                safari: safari,
                mteja: mteja,
                muda: new Date().toLocaleString()
            };

            // Kuchukua maagizo ya zamani
            let maagizo = JSON.parse(localStorage.getItem('maagizo_admin')) || [];
            maagizo.push(agizoJipya);

            // Kuhifadhi kwenye "Admin System"
            localStorage.setItem('maagizo_admin', JSON.stringify(maagizo));

            alert("Agizo limepokelewa! Admin anashughulikia sasa hivi.");
            window.location.href = 'index.html';
        }
    </script>

</body>

</html>
