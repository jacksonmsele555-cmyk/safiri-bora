<!DOCTYPE html>
<html lang="sw">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safari Bora | Agiza Mzigo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
         :root {
            --gold: #eab308;
            --bg: #050a18;
        }
        
        body {
            background: radial-gradient(circle at top, #1e3a8a 0%, #050a18 100%);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        
        .container {
            width: 100%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            padding: 25px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }
        
        h2 {
            color: var(--gold);
            text-align: center;
            font-weight: 800;
            margin-bottom: 25px;
            text-transform: uppercase;
            font-size: 20px;
        }
        
        .form-group {
            margin-bottom: 18px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: #94a3b8;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        select,
        textarea,
        input[type="text"] {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            color: white;
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
        }
        /* Sehemu fupi ya picha */
        
        .photo-upload {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.03);
            padding: 10px;
            border-radius: 15px;
            border: 1px dashed #64748b;
            margin-top: 10px;
            cursor: pointer;
        }
        
        .photo-upload i {
            font-size: 20px;
            color: var(--gold);
        }
        
        .photo-upload span {
            font-size: 13px;
            color: #cbd5e1;
        }
        
        #preview-small {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
            display: none;
            border: 1px solid var(--gold);
        }
        
        .btn-tuma {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, var(--gold), #b45309);
            border: none;
            border-radius: 20px;
            color: black;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(234, 179, 8, 0.4);
            margin-top: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Maelezo ya Agizo</h2>

        <div class="form-group">
            <label>Kutokea (Mkoa)</label>
            <select id="kutoka">
            <option>Dar es Salaam</option>
            <option>Mwanza</option>
            <option>Arusha</option>
            <option>Dodoma</option>
            <option>Mbeya</option>
            <option>Morogoro</option>
            <option>Kahama</option>
        </select>
        </div>

        <div class="form-group">
            <label>Kwenda (Mkoa)</label>
            <select id="kwenda">
            <option>Mwanza</option>
            <option>Dar es Salaam</option>
            <option>Arusha</option>
            <option>Dodoma</option>
            <option>Kahama</option>
            <option>Mbeya</option>
        </select>
        </div>

        <div class="form-group">
            <label>Aina ya Mzigo & Maelezo</label>
            <textarea id="maelezo" rows="3" placeholder="Mfano: Mifuko 50 ya Saruji..."></textarea>
        </div>

        <div class="form-group">
            <label>Picha ya Mzigo (Hiari)</label>
            <div class="photo-upload" onclick="document.getElementById('pichaInput').click()">
                <i class="fas fa-camera"></i>
                <span id="picha-text">Gusa kuongeza picha</span>
                <img id="preview-small" src="">
                <input type="file" id="pichaInput" accept="image/*" capture="environment" style="display: none;" onchange="onyeshaPicha()">
            </div>
        </div>

        <button class="btn-tuma" onclick="tumaWhatsApp()">
        <i class="fab fa-whatsapp" style="font-size: 22px;"></i>
        TUMA AGIZO KWA CEO
    </button>
    </div>

    <script>
        function onyeshaPicha() {
            const file = document.getElementById('pichaInput').files;
            const preview = document.getElementById('preview-small');
            const text = document.getElementById('picha-text');

            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    text.innerHTML = "Picha imewekwa ✅";
                }
                reader.readAsDataURL(file);
            }
        }

        function tumaWhatsApp() {
            var mwanzo = document.getElementById('kutoka').value;
            var mwisho = document.getElementById('kwenda').value;
            var maelezo = document.getElementById('maelezo').value;
            var nambaCEO = "255780777380";

            if (maelezo === "") {
                alert("Tafadhali andika maelezo ya mzigo!");
                return;
            }

            var ujumbe = "📦 *AGIZO JIPYA LA MZIGO*%0A%0A" +
                "📍 *Kutoka:* " + mwanzo + "%0A" +
                "🏁 *Kwenda:* " + mwisho + "%0A" +
                "📝 *Maelezo:* " + maelezo + "%0A%0A" +
                "_Nimeambatanisha picha ya mzigo huu._";

            window.location.href = "https://wa.me/" + nambaCEO + "?text=" + ujumbe;
        }
    </script>

</body>

</html>
